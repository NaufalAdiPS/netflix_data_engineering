services:
  postgres:
    image: postgres:13
    container_name: postgres_dw
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: xxxx
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:tanyamama123@postgres:5432/airflow_db
      PYTHONPATH: /opt/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/project
    command: >
      bash -c "
      if [ -f /opt/project/requirements.txt ]; then
        pip install --no-cache-dir -r /opt/project/requirements.txt;
      fi &&
      airflow db init &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@email.com || true
      "

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    container_name: airflow_webserver
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:xxxx@postgres:5432/airflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: xxxx
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: netflix_dw
      PYTHONPATH: /opt/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/project
    ports:
      - "8081:8080"
    command: >
      bash -c "
      if [ -f /opt/project/requirements.txt ]; then
        pip install --no-cache-dir -r /opt/project/requirements.txt;
      fi &&
      exec airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:xxxx@postgres:5432/airflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: xxxx
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: netflix_dw
      PYTHONPATH: /opt/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/project
    command: >
      bash -c "
      if [ -f /opt/project/requirements.txt ]; then
        pip install --no-cache-dir -r /opt/project/requirements.txt;
      fi &&
      exec airflow scheduler
      "

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_dw
    restart: always
    depends_on:
      - postgres
    ports:
      - "3000:3000"

    volumes:
      - metabase_data:/metabase-data

    environment:
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  postgres_data:
  metabase_data: